<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EAGLE ONE - Présentation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    .section {
      display: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .section.active {
      display: block;
    }

    .slide {
      display: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .slide.active {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .slide-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: none;
      padding: 20px 15px;
      font-size: 2rem;
      cursor: pointer;
      transition: background 0.3s ease;
      z-index: 100;
      height: 100%;
      width: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #prevBtn { left: 0; }
    #nextBtn { right: 0; }
    #prevBtn2 { left: 0; }
    #nextBtn2 { right: 0; }

    .slide-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 25px;
      border-radius: 25px;
      font-size: 1rem;
      letter-spacing: 2px;
      z-index: 100;
    }

    .section-title {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 25px;
      border-radius: 25px;
      font-size: 1rem;
      letter-spacing: 2px;
      z-index: 100;
      text-transform: uppercase;
    }

    .dots {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 100;
      flex-wrap: wrap;
      max-width: 90%;
      justify-content: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot.active {
      background: #e94560;
      transform: scale(1.3);
    }

    .dot:hover {
      background: rgba(255, 255, 255, 0.8);
    }

    .continue-overlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 150;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    .continue-overlay.active {
      display: flex;
    }

    .continue-btn {
      background: linear-gradient(135deg, #e94560, #c73e54);
      color: white;
      border: none;
      padding: 20px 50px;
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 30px rgba(233, 69, 96, 0.5);
      animation: pulse 2s infinite;
    }

    .continue-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 40px rgba(233, 69, 96, 0.7);
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 5px 30px rgba(233, 69, 96, 0.5); }
      50% { box-shadow: 0 5px 50px rgba(233, 69, 96, 0.8); }
    }

    .continue-text {
      color: white;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-align: center;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.3s ease;
      z-index: 100;
      border-radius: 25px;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>

  <script>
    let currentSection = 'eagle';
    let currentSlide = 0;
    let slides, dots, counter, prevBtn, nextBtn, totalSlides;

    function initSection(section) {
      currentSection = section;
      currentSlide = 0;

      if (section === 'eagle') {
        slides = document.querySelectorAll('#section-eagle .slide');
        dots = document.getElementById('dots-eagle');
        counter = document.getElementById('counter');
        prevBtn = document.getElementById('prevBtn');
        nextBtn = document.getElementById('nextBtn');
        totalSlides = 10;
      } else {
        slides = document.querySelectorAll('#section-parcours .slide');
        dots = document.getElementById('dots-parcours');
        counter = document.getElementById('counter2');
        prevBtn = document.getElementById('prevBtn2');
        nextBtn = document.getElementById('nextBtn2');
        totalSlides = 60;
      }

      // Generate dots
      dots.innerHTML = '';
      for (let i = 0; i < totalSlides; i++) {
        const dot = document.createElement('span');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => goToSlide(i);
        dots.appendChild(dot);
      }

      showSlide(0);
    }

    function showSlide(index) {
      slides.forEach(slide => slide.classList.remove('active'));
      const allDots = dots.querySelectorAll('.dot');
      allDots.forEach(dot => dot.classList.remove('active'));

      slides[index].classList.add('active');
      allDots[index].classList.add('active');
      counter.textContent = (index + 1) + ' / ' + totalSlides;

      prevBtn.style.display = index === 0 ? 'none' : 'flex';
      
      if (currentSection === 'eagle' && index === totalSlides - 1) {
        nextBtn.style.display = 'none';
        document.getElementById('continueOverlay').classList.add('active');
      } else {
        nextBtn.style.display = index === totalSlides - 1 ? 'none' : 'flex';
        if (currentSection === 'eagle') {
          document.getElementById('continueOverlay').classList.remove('active');
        }
      }
    }

    function changeSlide(direction) {
      currentSlide += direction;
      if (currentSlide < 0) currentSlide = 0;
      if (currentSlide >= totalSlides) currentSlide = totalSlides - 1;
      showSlide(currentSlide);
    }

    function goToSlide(index) {
      currentSlide = index;
      showSlide(currentSlide);
    }

    function goToParcours() {
      document.getElementById('section-eagle').classList.remove('active');
      document.getElementById('section-parcours').classList.add('active');
      initSection('parcours');
    }

    function goToEagle() {
      document.getElementById('section-parcours').classList.remove('active');
      document.getElementById('section-eagle').classList.add('active');
      initSection('eagle');
    }

    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        changeSlide(1);
      } else if (e.key === 'ArrowLeft') {
        changeSlide(-1);
      }
    });

    // Initialize
    initSection('eagle');
  </script>
