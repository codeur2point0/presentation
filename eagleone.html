<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EAGLE ONE - Présentation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    .slide {
      display: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .slide.active {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .slide-image {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: none;
      padding: 20px 15px;
      font-size: 2rem;
      cursor: pointer;
      transition: background 0.3s ease;
      z-index: 100;
      height: 100%;
      width: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #prevBtn {
      left: 0;
    }

    #nextBtn {
      right: 0;
    }

    .slide-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 25px;
      border-radius: 25px;
      font-size: 1rem;
      letter-spacing: 2px;
      z-index: 100;
    }

    .dots {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 100;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot.active {
      background: #e94560;
      transform: scale(1.3);
    }

    .dot:hover {
      background: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>
  <div class="slide active">
    <img src="presentation/EAGLE-ONE/Diapositive1.PNG" alt="Diapositive 1" class="slide-image">
  </div>

  <div class="slide">
    <img src="presentation/EAGLE-ONE/Diapositive2.PNG" alt="Diapositive 2" class="slide-image">
  </div>

  <div class="slide">
    <img src="presentation/EAGLE-ONE/Diapositive3.PNG" alt="Diapositive 3" class="slide-image">
  </div>

  <div class="slide">
    <img src="presentation/EAGLE-ONE/Diapositive4.PNG" alt="Diapositive 4" class="slide-image">
  </div>

  <div class="slide">
    <img src="presentation/EAGLE-ONE/Diapositive5.PNG" alt="Diapositive 5" class="slide-image">
  </div>

  <div class="slide">
    <img src="presentation/EAGLE-ONE/Diapositive6.PNG" alt="Diapositive 6" class="slide-image">
  </div>

  <div class="slide">
    <img src="presentation/EAGLE-ONE/Diapositive7.PNG" alt="Diapositive 7" class="slide-image">
  </div>

  <div class="slide">
    <img src="presentation/EAGLE-ONE/Diapositive8.PNG" alt="Diapositive 8" class="slide-image">
  </div>

  <div class="slide">
    <img src="presentation/EAGLE-ONE/Diapositive9.PNG" alt="Diapositive 9" class="slide-image">
  </div>

  <div class="slide">
    <img src="presentation/EAGLE-ONE/Diapositive10.PNG" alt="Diapositive 10" class="slide-image">
  </div>

  <button class="btn" id="prevBtn" onclick="changeSlide(-1)">❮</button>
  <button class="btn" id="nextBtn" onclick="changeSlide(1)">❯</button>

  <div class="dots">
    <span class="dot active" onclick="goToSlide(0)"></span>
    <span class="dot" onclick="goToSlide(1)"></span>
    <span class="dot" onclick="goToSlide(2)"></span>
    <span class="dot" onclick="goToSlide(3)"></span>
    <span class="dot" onclick="goToSlide(4)"></span>
    <span class="dot" onclick="goToSlide(5)"></span>
    <span class="dot" onclick="goToSlide(6)"></span>
    <span class="dot" onclick="goToSlide(7)"></span>
    <span class="dot" onclick="goToSlide(8)"></span>
    <span class="dot" onclick="goToSlide(9)"></span>
  </div>

  <div class="slide-counter" id="counter">1 / 10</div>

  <script>
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    const counter = document.getElementById('counter');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const totalSlides = slides.length;

    function showSlide(index) {
      slides.forEach(slide => slide.classList.remove('active'));
      dots.forEach(dot => dot.classList.remove('active'));

      slides[index].classList.add('active');
      dots[index].classList.add('active');
      counter.textContent = (index + 1) + ' / ' + totalSlides;

      prevBtn.style.display = index === 0 ? 'none' : 'flex';
      nextBtn.style.display = index === totalSlides - 1 ? 'none' : 'flex';
    }

    function changeSlide(direction) {
      currentSlide += direction;
      
      if (currentSlide < 0) currentSlide = 0;
      if (currentSlide >= totalSlides) currentSlide = totalSlides - 1;
      
      showSlide(currentSlide);
    }

    function goToSlide(index) {
      currentSlide = index;
      showSlide(currentSlide);
    }

    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        changeSlide(1);
      } else if (e.key === 'ArrowLeft') {
        changeSlide(-1);
      }
    });

    // Initialize
    showSlide(0);
  </script>
</body>
</html>
